name: Deploy staging to GitHub Pages

# Builds with VITE_DEPLOY_TARGET=staging and deploys via the Pages action.
#
# Requires Pages source to be set to "GitHub Actions" in repo Settings -> Pages
# (instead of "Deploy from a branch"). After that switch, this workflow is the
# only thing that publishes to https://aeiti.github.io/kato8-staging/.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight Pages deploy at a time; queue the latest.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build
        env:
          VITE_DEPLOY_TARGET: staging
          # Set in Settings -> Secrets and variables -> Actions -> Variables.
          # Defaults to empty so the form falls back to a no-op submit if
          # the endpoint isn't configured.
          VITE_NEWSLETTER_ENDPOINT: ${{ vars.VITE_NEWSLETTER_ENDPOINT }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
