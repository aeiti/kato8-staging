name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

# Serialize releases so concurrent pushes compute distinct patch numbers.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a token that can push tags back.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next CalVer version
        id: version
        run: |
          set -euo pipefail
          git fetch --tags --force
          DATE="$(date -u +'%Y.%m.%d')"
          LAST_PATCH=$(git tag --list "v${DATE}.*" \
            | sed -E "s/^v${DATE}\.//" \
            | sort -n | tail -n1 || true)
          if [ -z "${LAST_PATCH:-}" ]; then
            NEXT_PATCH=0
          else
            NEXT_PATCH=$((LAST_PATCH + 1))
          fi
          VERSION="${DATE}.${NEXT_PATCH}"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Next release: ${TAG}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}
          REACT_APP_VERSION: ${{ steps.version.outputs.version }}
        run: npm run build

      - name: Locate build output
        id: build_dir
        run: |
          set -euo pipefail
          if [ -d dist ]; then
            echo "dir=dist" >> "$GITHUB_OUTPUT"
          elif [ -d build ]; then
            echo "dir=build" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No dist/ or build/ directory found after build"
            exit 1
          fi

      - name: Package build artifact
        run: |
          set -euo pipefail
          DIR="${{ steps.build_dir.outputs.dir }}"
          TAG="${{ steps.version.outputs.tag }}"
          tar -czf "build-${TAG}.tar.gz" -C "$DIR" .

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            "build-${TAG}.tar.gz"
