    <script>
      // SPA fallback decoder for GitHub Pages.
      // Pairs with public/404.html — converts /?/games/corebound back into /games/corebound

      ;(function (l) {
        if (l.search[1] === '/') {

            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')

            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
