    <script>
      // SPA fallback decoder for GitHub Pages.
      // Pairs with public/404.html — converts /?/games/corebound back into /games/corebound
      // before React Router reads window.location, so direct visits and refreshes work.
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
