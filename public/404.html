<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Kato.8 Studios</title>
    <script>
      // SPA fallback for GitHub Pages.
      // GitHub Pages serves this 404.html for any path that doesn't map to a real file.
      // We encode the requested path into a query string and redirect to / so the SPA
      // can read it and restore the route. Paired with the decode snippet in index.html.
      // Subpath deployment (aeiti.github.io/kato8-staging/), so pathSegmentsToKeep = 1.
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
